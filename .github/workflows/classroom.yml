name: Autograding Tests
'on':
- workflow_dispatch
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: FGV-es1-pratica-avaliada2-test
      id: fgv-es1-pratica-avaliada2-test
      uses: classroom-resources/autograding-python-grader@v1
      with:
        timeout: 10
        setup-command: ''
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        FGV-ES1-PRATICA-AVALIADA2-TEST_RESULTS: "${{steps.fgv-es1-pratica-avaliada2-test.outputs.result}}"
      with:
        runners: fgv-es1-pratica-avaliada2-test
